<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>

        body{
            font-family:Arial;
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:white;
            padding:40px;
            width:350px;
            border-radius:10px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:15px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            background:darkblue;
            color:white;
            border:none;
            cursor:pointer;
        }

    </style>

</head>
<body>

<div class="box">

    <h2>Login</h2>

    <input type="email" id="email" placeholder="Enter Email">

    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="login()">
        Login
    </button>

</div>

<script>

function login(){

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    fetch("http://localhost:3000/login", {

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            email:email,
            password:password
        })

    })

    .then(res => res.json())

    .then(data => {

        if(data.success){

            alert("Login Successful");

            window.location.href = "dashboard.html";

        }
        else{

            alert("Invalid Email or Password");

        }

    });

}

</script>

</body>
</html>
